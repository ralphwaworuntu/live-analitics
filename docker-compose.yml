# ============================================
# SENTINEL — Docker Compose (Production)
# Live Tracking & AI Command Center
# Biro Operasi Polda NTT
# ============================================
# Usage:
#   cp .env.production .env
#   docker compose up -d --build
# ============================================

services:
  # ============================================
  # 1. Nginx Reverse Proxy + SSL
  # ============================================
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/sentinel.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - sentinel-net

  # Certbot for auto SSL renewal
  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    networks:
      - sentinel-net

  # ============================================
  # 2. PostGIS Database (Encrypted at Rest)
  # ============================================
  db:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinel_db
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sentinel_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-net
    # Security: No external port exposure in production
    # ports:
    #   - "5432:5432"

  # ============================================
  # 3. Ollama AI Engine (Llama 3 8B — GPU)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - sentinel-net
    # No external port in production
    # ports:
    #   - "11434:11434"

  # ============================================
  # 4. Milvus Vector DB (for RAG pipeline)
  # ============================================
  milvus:
    image: milvusdb/milvus:v2.4.0
    restart: unless-stopped
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - sentinel-net
    # No external port in production
    # ports:
    #   - "19530:19530"

  # ============================================
  # 5. Redis for BFT Pub/Sub (Scale Ready)
  # ============================================
  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # 5. FastAPI Backend (SENTINEL API)
  # ============================================
  api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
      milvus:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://sentinel:${DB_PASSWORD:-sentinel_secret}@db:5432/sentinel_db
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3:8b}
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      IP_WHITELIST: ${IP_WHITELIST:-}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-sentinel-uploads}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      DEBUG: ${DEBUG:-false}
    networks:
      - sentinel-net
    # No external port; proxied via nginx
    # ports:
    #   - "8000:8000"

  # ============================================
  # 6. Next.js Dashboard (SENTINEL UI)
  # ============================================
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://api:8000}
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_KEY:-}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api:8000}
      NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${GOOGLE_MAPS_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
    networks:
      - sentinel-net
    # No external port; proxied via nginx
    # ports:
    #   - "3000:3000"

# ============================================
# Volumes (Persistent Data)
# ============================================
volumes:
  letsencrypt:
  certbot_www:
  pgdata:
  ollama_data:
  milvus_data:

# ============================================
# Networks (Internal Bridge)
# ============================================
networks:
  sentinel-net:
    driver: bridge
