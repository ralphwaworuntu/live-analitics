version: '3.8'

services:
  sentinel-socket:
    build: ./server
    container_name: sentinel-socket-server
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - JWT_SECRET=SENTINEL-SECRET-KEY-2026
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - sentinel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  sentinel-dashboard:
    build: ./apps/dashboard
    container_name: sentinel-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://sentinel-socket:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - sentinel-socket
    networks:
      - sentinel-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - sentinel-network
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  sentinel-network:
    driver: bridge

volumes:
  redis-data:
