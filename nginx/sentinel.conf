# ============================================
# SENTINEL — Nginx Reverse Proxy Configuration
# Polda NTT Command Center
# ============================================

upstream fastapi_backend {
    server api:8000;
}

upstream nextjs_frontend {
    server dashboard:3000;
}

# --- HTTP (redirect to HTTPS) ---
server {
    listen 80;
    server_name sentinel.poldantt.polri.go.id;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Force HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS (main server) ---
server {
    listen 443 ssl http2;
    server_name sentinel.poldantt.polri.go.id;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/sentinel.poldantt.polri.go.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sentinel.poldantt.polri.go.id/privkey.pem;

    # SSL Hardening (POLRI Security Standard)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers (WAF Layer)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.googleapis.com https://*.gstatic.com; connect-src 'self' https://maps.googleapis.com wss://$host;" always;

    # Rate Limiting Zone (Anti-DDoS)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Max Upload Size (for Vision/Camera uploads)
    client_max_body_size 50M;

    # --- Frontend Dashboard (Next.js) ---
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- Backend API (FastAPI) ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Login Endpoint (Strict Rate Limit) ---
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket (Socket.IO for Emergency Broadcast) ---
    location /ws/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s; # Keep WebSocket alive for 24h
        proxy_send_timeout 86400s;
    }

    # --- Health Check ---
    location /health {
        access_log off;
        proxy_pass http://fastapi_backend/api/health;
    }
}
